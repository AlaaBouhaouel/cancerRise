{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – CancerRise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'cancerapp/css/main.css' %}">
  <style>
    .db-status {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
      margin-bottom: 1.25rem;
    }
    .db-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #bbb; flex-shrink: 0; transition: background 0.3s;
    }
    .db-dot.synced  { background: #4CAF50; animation: dbBlink 2s ease-in-out infinite; }
    .db-dot.error   { background: var(--danger); }
    .db-dot.loading { background: #FB8C00; animation: dbBlink 0.7s ease-in-out infinite; }
    @keyframes dbBlink { 0%,100%{opacity:1} 50%{opacity:.35} }

    .login-error {
      background: var(--danger-light); border: 1px solid #EF9A9A;
      border-radius: var(--radius-sm); padding: 0.7rem 1rem;
      font-size: 0.83rem; font-weight: 700; color: var(--danger);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .login-error.hidden { display: none; }

    .pin-input { letter-spacing: 0.35em; }

    /* Card-detected toast — slides down from top */
    .card-toast {
      position: fixed; top: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
      color: #fff; padding: 0.75rem 1.6rem;
      border-radius: 50px; font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 0.9rem;
      box-shadow: 0 8px 28px rgba(160,45,98,0.35);
      display: flex; align-items: center; gap: 0.6rem;
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .card-toast.show { transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<!-- Card-detected toast -->
<div class="card-toast" id="cardToast" aria-live="polite" aria-atomic="true">
  <i class="fa-solid fa-id-card" aria-hidden="true"></i>
  <span id="cardToastMsg">Card detected — verifying…</span>
</div>

<main class="login-page">
  <div class="login-card" role="main">

    <div class="login-logo">
      <div class="logo-name">
        <i class="fa-solid fa-ribbon" aria-hidden="true"></i> CancerRise
      </div>
      <div class="logo-sub">Your Breast Cancer Rehabilitation Platform</div>
    </div>

    <div class="login-welcome">
      <h2>Welcome Back</h2>
      <p>Scan your card or enter your details to access your dashboard.</p>
    </div>

    <!-- Live connection status -->
    <div class="db-status" aria-live="polite">
      <span class="db-dot loading" id="dbDot"></span>
      <span id="dbStatusText">Connecting to server…</span>
    </div>

    <!-- Error banner -->
    <div class="login-error hidden" id="loginError" role="alert">
      <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
      <span id="loginErrorMsg">Credentials not recognised. Please try again.</span>
    </div>

    <form id="loginForm" novalidate aria-label="Sign in form" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label" for="fieldName">Full Name</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user" aria-hidden="true"></i>
          <input
            type="text" id="fieldName"
            class="form-input"
            placeholder="Your registered full name"
            autocomplete="name"
            aria-required="true"
            spellcheck="false"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="fieldId">Patient ID</label>
        <div class="input-wrap">
          <i class="fa-solid fa-id-card" aria-hidden="true"></i>
          <input
            type="text" id="fieldId"
            class="form-input"
            placeholder="Your patient ID"
            autocomplete="off"
            aria-required="true"
            spellcheck="false"
            autocapitalize="none"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="fieldPin">PIN</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock" aria-hidden="true"></i>
          <input
            type="password" id="fieldPin"
            class="form-input pin-input"
            placeholder="••••••"
            autocomplete="current-password"
            inputmode="numeric"
            aria-required="true"
            maxlength="12"
          >
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
        <i class="fa-solid fa-arrow-right-to-bracket" aria-hidden="true"></i>
        Sign In Securely
      </button>

    </form>

    <div class="back-to-site" style="margin-top: 1.5rem;">
      <a href="{% url 'landing' %}">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
        Back to CancerRise.com
      </a>
    </div>

  </div>
</main>

<script>
  var REALTIME_URL      = 'https://atast2026-default-rtdb.europe-west1.firebasedatabase.app/.json';
  var FIRESTORE_PROJECT = 'atast2026';
  var FIRESTORE_QUERY   = 'https://firestore.googleapis.com/v1/projects/'
                          + FIRESTORE_PROJECT
                          + '/databases/(default)/documents:runQuery';

  var prevData     = null;
  var isFirstFetch = true;
  var isVerifying  = false;

  /* ---- UI helpers ---- */
  function setStatus(state, text) {
    document.getElementById('dbDot').className = 'db-dot ' + state;
    document.getElementById('dbStatusText').textContent = text;
  }
  function showError(msg) {
    var el = document.getElementById('loginError');
    document.getElementById('loginErrorMsg').textContent = msg;
    el.classList.remove('hidden');
  }
  function hideError() {
    document.getElementById('loginError').classList.add('hidden');
  }
  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById('cardToast');
    document.getElementById('cardToastMsg').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3800);
  }
  /* ---- Poll Realtime DB every second ---- */
  function pollRealtimeDB() {
    fetch(REALTIME_URL)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        setStatus('synced', 'Reader connected · Waiting for card');

        if (isFirstFetch) {
          prevData     = JSON.stringify(data);
          isFirstFetch = false;
          return;
        }

        /* Verify directly when data changes (card scanned) */
        var current = JSON.stringify(data);
        if (current !== prevData) {
          prevData = current;
          console.log('Card detected:', data);
          handleCardScan(data);
        }
      })
      .catch(function() {
        setStatus('error', 'Cannot reach card reader');
      });
  }

  pollRealtimeDB();
  setInterval(pollRealtimeDB, 1000);

  /* ---- Card scanned: verify immediately, no form fill ---- */
  function handleCardScan(data) {
    /* Data is nested: { "user1": { "full name": "...", "id": "...", "pin": "..." } } */
    var user = null;
    var keys = Object.keys(data || {});
    for (var i = 0; i < keys.length; i++) {
      var val = data[keys[i]];
      if (val && typeof val === 'object') { user = val; break; }
    }
    if (!user) {
      showError('Card data incomplete — missing name, ID, or PIN.');
      return;
    }

    var fullName = user['full name'] || user['fullname'] || user['full_name'] || user['name'] || '';
    var id       = user['id']  !== undefined ? String(user['id'])  : '';
    var pin      = user['pin'] !== undefined ? String(user['pin']) : '';

    if (!fullName || !id || !pin) {
      showError('Card data incomplete — missing name, ID, or PIN.');
      return;
    }

    showToast('Card detected — verifying…');
    hideError();
    verifyAgainstFirestore(fullName, id, pin, true);
  }

  /* =====================================================
     STEP 3 — VERIFY AGAINST FIRESTORE (primary DB)
     ===================================================== */
  function verifyAgainstFirestore(fullName, id, pin, isAutomatic) {
    if (isVerifying) return;
    isVerifying = true;

    if (isAutomatic) {
      setStatus('loading', 'Verifying identity…');
    }

    /* Fetch all users then match in JS (avoids Firestore composite index issues) */
    var body = {
      structuredQuery: {
        from: [{ collectionId: 'users' }],
        limit: 100
      }
    };

    fetch(FIRESTORE_QUERY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) {
      return res.json().then(function(data) {
        return { status: res.status, ok: res.ok, data: data };
      });
    })
    .then(function(result) {
      isVerifying = false;

      if (!result.ok) {
        if (result.status === 403) {
          setStatus('error', 'Database access denied');
          showError('Permission denied by database. Update Firestore security rules.');
        } else {
          setStatus('error', 'Database error');
          showError('Database error — please try again.');
        }
        return;
      }

      /* Match username + id + pin in JS, handling both string and integer field types */
      var matched = null;
      for (var i = 0; i < result.data.length; i++) {
        var doc = result.data[i].document;
        if (!doc) continue;
        var f = doc.fields || {};
        var dbUsername = f.username ? (f.username.stringValue || '') : '';
        var dbId       = f.id  ? (f.id.stringValue  || String(f.id.integerValue  || '')) : '';
        var dbPin      = f.pin ? (f.pin.stringValue  || String(f.pin.integerValue || '')) : '';
        if (dbUsername === fullName && dbId === id && dbPin === pin) {
          matched = doc;
          break;
        }
      }

      if (matched) {
        onLoginSuccess(fullName, matched);
      } else {
        setStatus('synced', 'Reader connected · Waiting for card');
        showError('Card not recognised. This card is not registered in the system.');
      }
    })
    .catch(function(err) {
      isVerifying = false;
      setStatus('error', 'Network error');
      showError('Cannot reach the database — check your internet connection.');
    });
  }

  /* =====================================================
     STEP 4 — LOGIN SUCCESS
     ===================================================== */
  function onLoginSuccess(fullName, firestoreDoc) {
    /* Pull fields from the Firestore document */
    var fields   = firestoreDoc.fields || {};
    var name     = fields.username    ? fields.username.stringValue    : fullName;
    var patientId = fields.id        ? fields.id.stringValue           : '';
    var history  = fields.History    ? fields.History.stringValue      : '';

    /* Derive initials */
    var parts    = name.trim().split(/\s+/);
    var initials = parts.length > 1
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();

    /* Save to sessionStorage for other pages */
    sessionStorage.setItem('cr_name',      name);
    sessionStorage.setItem('cr_initials',  initials);
    sessionStorage.setItem('cr_id',        patientId);
    sessionStorage.setItem('cr_history',   history);

    showToast('Welcome, ' + name + '!');
    setTimeout(function() {
      window.location.href = "{% url 'home' %}";
    }, 600);
  }

  /* =====================================================
     MANUAL LOGIN (Sign In button)
     ===================================================== */
  function handleLogin(e) {
    e.preventDefault();
    hideError();

    var fullName = document.getElementById('fieldName').value.trim();
    var id       = document.getElementById('fieldId').value.trim();
    var pin      = document.getElementById('fieldPin').value.trim();

    if (!fullName || !id || !pin) {
      showError('Please fill in all three fields.');
      return;
    }

    verifyAgainstFirestore(fullName, id, pin, false);
  }

  /* Clear error as user types */
  ['fieldName', 'fieldId', 'fieldPin'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', hideError);
  });
</script>

</body>
</html>
